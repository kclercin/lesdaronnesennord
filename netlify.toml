[build]
  command = "npm run build"
  publish = "public"

# Redirection canonique : www -> apex (Netlify la fait aussi automatiquement
# via le "primary domain", ces règles servent de garantie explicite)
[[redirects]]
  from = "https://www.lesdaronnesennord.fr/*"
  to = "https://lesdaronnesennord.fr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.lesdaronnesennord.fr/*"
  to = "https://lesdaronnesennord.fr/:splat"
  status = 301
  force = true
